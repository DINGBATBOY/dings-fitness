# ───────────────────── Codemagic CI for Ding! Fitness ─────────────────────
#
# Codemagic builds the iOS app from your repo and uploads to App Store
# Connect / TestFlight. Recommended over raw GitHub Actions because the
# code-signing setup is UI-driven instead of base64-encoded-secret hell.
#
# ## First-time setup (one-time, ~30 min)
#
# 1. Sign up at https://codemagic.io (use your GitHub account).
# 2. Connect this repo.
# 3. In Codemagic → Teams → Integrations → "App Store Connect":
#    - Generate an App Store Connect API key at
#      https://appstoreconnect.apple.com/access/integrations/api
#    - Issuer ID + Key ID + .p8 file → upload to Codemagic
# 4. In Codemagic → this app → Settings → iOS code signing:
#    - Pick "Automatic" mode
#    - Select your team
#    - Codemagic will fetch/generate certs + provisioning profiles for you
# 5. Create the App Store Connect app record:
#    - https://appstoreconnect.apple.com/apps → "+" → New App
#    - Bundle ID: com.dings.fitness  (must match capacitor.config.ts)
#    - Name: Ding! Fitness
#    - Primary language: English (U.S.)
#    - SKU: dings-fitness-ios-001 (any unique string)
# 6. Trigger your first build by pushing to `main` — Codemagic does the rest.
#
# ## What this workflow does on every push to main
#
# 1. Installs JS deps (with Capacitor)
# 2. Builds the web bundle (`npm run build`)
# 3. Syncs into the iOS project (`npx cap sync ios`)
# 4. Installs CocoaPods (`pod install`)
# 5. Builds the .ipa via xcodebuild
# 6. Uploads to TestFlight (internal testing)
# 7. Emails you when build is ready

workflows:
  ios-testflight:
    name: iOS · TestFlight (main)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic       # name you give the API key in Codemagic UI

    # NOTE on signing: we intentionally do NOT use the `environment.ios_signing`
    # block. That block triggers Codemagic's PRE-script auto-signing, which
    # only looks for existing profiles and fails on a fresh Apple account
    # before our explicit script runs. Instead we use the
    # `app-store-connect fetch-signing-files ... --create` step below, which
    # creates the cert + profile on Apple's side using the API key.
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: 6776480908
        BUNDLE_ID: "com.dings.fitness"
      node: 22
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install JS deps
        script: |
          npm ci

      - name: Build web bundle (Vite)
        script: |
          npm run build

      - name: Sync Capacitor → iOS
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App && pod install

      # ─── First-run signing setup ────────────────────────────────────────
      # On a fresh Apple account there are no signing files yet — this step
      # uses the App Store Connect API key to CREATE them (the --create flag
      # is the key bit). After the first successful build the cert is cached
      # in the Developer Portal; subsequent builds reuse it. The explicit
      # --xcode-project path is needed because Capacitor's iOS project lives
      # in ios/App/, not the workspace root.
      - name: Initialize keychain + create signing files
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles --xcode-project ios/App/App.xcodeproj

      - name: Bump iOS build number
        script: |
          cd ios/App
          BUILD_NUMBER=$(($(date +%s) % 100000))
          agvtool new-version -all $BUILD_NUMBER

      # ─── Build & archive ────────────────────────────────────────────────
      # We pass DEVELOPMENT_TEAM and CODE_SIGN_STYLE explicitly so xcodebuild
      # has everything it needs even if use-profiles' write to .pbxproj
      # didn't stick. With these, Xcode auto-matches to the profile in the
      # keychain by team + bundle ID — no manual profile spec needed.
      - name: Build .ipa
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM CODE_SIGN_STYLE=Automatic"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Internal testing only — these names must match groups you've created
        # in App Store Connect → TestFlight → Internal Testing.
        beta_groups:
          - Internal
      email:
        recipients:
          - cuodibeltran@gmail.com
        notify:
          success: true
          failure: true
